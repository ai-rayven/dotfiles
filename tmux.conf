# Unbind the default prefix
unbind C-b

# Set new prefix to Ctrl+A
set -g prefix C-a
bind C-a send-prefix

set -g mouse on
set -g base-index 1
setw -g pane-base-index 1
set -g renumber-windows on

set -g default-terminal "tmux-256color"
set -as terminal-features ",xterm-256color:RGB"

# Move between panes using Alt + h/j/k/l
bind -n M-h select-pane -L
bind -n M-j select-pane -D
bind -n M-k select-pane -U
bind -n M-l select-pane -R

# Vim-style pane resizing (prefix + H/J/K/L)
bind H resize-pane -L 5
bind J resize-pane -D 5
bind K resize-pane -U 5
bind L resize-pane -R 5

# Interactive AI Split Menu (prefix + a)
bind a display-menu -T " Launch AI Tool " \
  "Claude"   l "split-window -h -l 30% -c '#{pane_current_path}' 'claude --enable-auto-mode'" \
  "Copilot"  p "split-window -h -l 30% -c '#{pane_current_path}' 'copilot'" \
  "Antigravity" o "split-window -h -l 30% -c '#{pane_current_path}' 'agy'"

bind p display-popup -E

# Opens the AI response in a new side pane instead of a popup
bind q command-prompt -p "Ask:" "split-window -h -p 30 -c '#{pane_current_path}' 'agy -p \"%1\" --dangerously-skip-permissions | glow -p'"
