# Move between panes using Alt + h/j/k/l
bind -n M-h select-pane -L
bind -n M-j select-pane -D
bind -n M-k select-pane -U
bind -n M-l select-pane -R

# Vim-style pane resizing (prefix + H/J/K/L)
bind H resize-pane -L 5
bind J resize-pane -D 5
bind K resize-pane -U 5
bind L resize-pane -R 5

# Interactive AI Split Menu (prefix + a)
bind a display-menu -T " Launch AI Tool " \
  "Claude"   l "split-window -h -l 30% 'claude --enable-auto-mode'" \
  "Copilot"  p "split-window -h -l 30% 'copilot'" \
  "Antigravity" o "split-window -h -l 30% 'agy'"


set -g mouse on
